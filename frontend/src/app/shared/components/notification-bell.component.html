<div class="notification-bell" (click)="$event.stopPropagation()">
  <button type="button" class="bell-button" (click)="toggleDropdown($event)" aria-label="Notifications">
    <svg class="bell-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 0 0-5-6.7V3a2 2 0 1 0-4 0v1.3A7 7 0 0 0 5 11v5l-2 2v1h18v-1l-2-2Z" />
    </svg>
    <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <div class="notification-dropdown" *ngIf="dropdownOpen">
    <div class="notification-header">
      <h3>Notifications</h3>
      <button type="button" class="mark-all-button" *ngIf="notifications.length > 0" (click)="markAllAsRead($event)">
        Mark all as read
      </button>
    </div>

    <div class="notification-list" *ngIf="notifications.length > 0; else emptyState">
      <div *ngFor="let group of groupedNotifications" class="notification-group">
        <div class="group-date-header">{{ group.date }}</div>
        <button
          type="button"
          class="notification-item"
          *ngFor="let notification of group.notifications"
          [class.unread]="notification.is_read === 0"
          [class.read]="notification.is_read === 1"
          (click)="onNotifClick(notification)"
        >
          <div class="notification-content">
            <div class="notification-indicator" *ngIf="notification.is_read === 0"></div>
            <div class="notification-text">
              <span class="notification-message">{{ notification.message }}</span>
              <span class="notification-time">{{ notification.created_at | relativeTime }}</span>
            </div>
          </div>
        </button>
      </div>
    </div>

    <ng-template #emptyState>
      <div class="empty-state">No new notifications</div>
    </ng-template>

    <div class="pagination-controls" *ngIf="totalPages > 1">
      <button type="button" (click)="previousPage($event)" [disabled]="currentPage <= 1">Previous</button>
      <span>Page {{ currentPage }} of {{ totalPages }}</span>
      <button type="button" (click)="nextPage($event)" [disabled]="currentPage >= totalPages">Next</button>
    </div>
  </div>
</div>
