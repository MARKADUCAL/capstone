<div class="container" [class.sidebar-collapsed]="!sidebarOpen">
  <div class="sidebar" [class.sidebar-active]="sidebarActive">
    <div class="sidebar-close" (click)="toggleSidebar()">
      <i class="fas fa-times"></i>
    </div>
    <div class="logo-container">
      <img src="assets/logo3.png" alt="Logo" />
      <h2>Leydi Boss</h2>
    </div>
    <ul class="nav-links">
      <li>
        <a
          routerLink="/employee-view/dashboard"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-tachometer-alt"></i> Dashboard</a
        >
      </li>
      <li>
        <a
          routerLink="/employee-view/car-wash-booking"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-calendar-alt"></i> Car Wash Bookings</a
        >
      </li>
      <li>
        <a
          routerLink="/employee-view/customer-records"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-user-friends"></i> Customer Records</a
        >
      </li>
    </ul>

    <!-- User Profile Section at Bottom -->
    <div class="sidebar-user-section">
      <div class="sidebar-user-actions">
        <a
          routerLink="/employee-view/profile"
          routerLinkActive="active"
          class="sidebar-action-item"
          (click)="closeSidebarOnMobile()"
        >
          <i class="fas fa-user"></i> Profile
        </a>
        <a class="sidebar-action-item logout-item" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-avatar">{{ userInitials }}</div>
        <div class="sidebar-user-details">
          <span class="sidebar-user-name">{{ fullName }}</span>
          <span class="sidebar-user-role">Employee</span>
        </div>
      </div>
    </div>
  </div>

  <div
    class="sidebar-overlay"
    [class.active]="sidebarActive"
    (click)="toggleSidebar()"
  ></div>

  <div class="content">
    <div class="header">
      <div class="menu-icon" (click)="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </div>
      <h2>{{ pageTitle }}</h2>
      <div class="user-info">
        <div class="user-profile-display">
          <div class="user-avatar-placeholder">{{ userInitials }}</div>
          <span class="user-name">{{ fullName }}</span>
        </div>
      </div>
    </div>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
