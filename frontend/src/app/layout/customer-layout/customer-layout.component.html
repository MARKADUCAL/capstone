<div class="container" [class.sidebar-collapsed]="!sidebarOpen">
  <div class="sidebar" [class.active]="sidebarActive">
    <div class="close-btn" (click)="toggleSidebar()">
      <i class="fas fa-times"></i>
    </div>
    <div class="logo-container">
      <img src="assets/logo3.png" alt="Logo" />
      <h2>Leydi Boss</h2>
    </div>
    <nav class="nav-menu">
      <a
        routerLink="/customer-view/services"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
        (click)="closeSidebarOnMobile()"
      >
        <i class="fas fa-tag"></i> Booking
      </a>
      <a
        routerLink="/customer-view/appointment"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
        (click)="closeSidebarOnMobile()"
      >
        <i class="fas fa-calendar-alt"></i> Appointment
      </a>
      <a
        routerLink="/customer-view/tranaction-hitory"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
        (click)="closeSidebarOnMobile()"
      >
        <i class="fas fa-history"></i> Transaction History
      </a>
    </nav>

    <!-- User Profile Section at Bottom -->
    <div class="sidebar-user-section">
      <div class="sidebar-user-actions">
        <a
          routerLink="/customer-view/profile"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="sidebar-action-item"
          (click)="closeSidebarOnMobile()"
        >
          <i class="fas fa-user"></i> Profile
        </a>
        <a class="sidebar-action-item logout-item" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-avatar">{{ userInitials }}</div>
        <div class="sidebar-user-details">
          <span class="sidebar-user-name">{{ fullName }}</span>
          <span class="sidebar-user-role">Customer</span>
        </div>
      </div>
    </div>
  </div>

  <div
    class="sidebar-overlay"
    [class.active]="sidebarActive"
    (click)="toggleSidebar()"
  ></div>

  <div class="content">
    <header class="header">
      <div class="menu-icon" (click)="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </div>
      <h2 class="page-title">{{ pageTitle }}</h2>
      <div class="user-info">
        <div class="user-profile-display">
          <div class="user-avatar-placeholder">{{ userInitials }}</div>
          <span class="user-name">{{ fullName }}</span>
        </div>
      </div>
    </header>

    <!-- Logout Confirmation Dialog -->
    <div
      class="logout-dialog-overlay"
      *ngIf="showLogoutDialog"
      (click)="cancelLogout()"
    >
      <div class="logout-dialog" (click)="$event.stopPropagation()">
        <div class="logout-dialog-header">
          <h2>Confirm Logout</h2>
        </div>
        <div class="logout-dialog-body">
          <p>
            Are you sure you want to logout? You will need to sign in again to
            access your account.
          </p>
        </div>
        <div class="logout-dialog-footer">
          <button class="btn-cancel" (click)="cancelLogout()">Cancel</button>
          <button class="btn-logout-confirm" (click)="confirmLogout()">
            Logout
          </button>
        </div>
      </div>
    </div>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
