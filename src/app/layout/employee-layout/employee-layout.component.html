<div class="container">
  <div class="sidebar" [class.sidebar-active]="sidebarActive">
    <div class="sidebar-close" (click)="toggleSidebar()">✕</div>
    <div class="logo">
      <img src="assets/images/logo.svg" alt="Logo" />
      <h2>AutoWash Hub</h2>
    </div>
    <ul class="nav-links">
      <li>
        <a
          routerLink="/employee/dashboard"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-tachometer-alt"></i> Dashboard</a
        >
      </li>
      <li>
        <a
          routerLink="/employee/appointments"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-calendar-alt"></i> Appointments</a
        >
      </li>
      <li>
        <a
          routerLink="/employee/wash-services"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-car"></i> Wash Services</a
        >
      </li>
      <li>
        <a
          routerLink="/employee/customer-records"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-user-friends"></i> Customer Records</a
        >
      </li>
      <li>
        <a
          routerLink="/employee/inventory"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-box"></i> Inventory</a
        >
      </li>
      <li>
        <a
          routerLink="/employee/time-tracking"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()"
          ><i class="fas fa-clock"></i> Time Tracking</a
        >
      </li>
    </ul>
  </div>

  <div
    class="sidebar-overlay"
    *ngIf="sidebarActive"
    (click)="toggleSidebar()"
  ></div>

  <div class="content">
    <div class="header">
      <div class="menu-icon" (click)="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </div>
      <h2>Employee Dashboard</h2>
      <div class="user-info" (clickOutside)="hideDropdown()">
        <img class="user-avatar" src="assets/images/avatar.jpg" alt="User" />
        <span class="user-name">Mark Aducal</span>
        <button class="dropdown-btn" (click)="toggleDropdown()">▼</button>
        <div class="dropdown-menu" [class.show-dropdown]="showDropdown">
          <a class="dropdown-item" routerLink="/employee/profile">
            <i class="fas fa-user profile-icon"></i> Profile
          </a>
          <a class="dropdown-item" (click)="logout()">
            <i class="fas fa-sign-out-alt logout-icon"></i> Logout
          </a>
        </div>
      </div>
    </div>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
