<div class="container">
  <!-- Mobile sidebar toggle button -->
  <button
    class="mobile-toggle"
    (click)="toggleSidebar()"
    aria-label="Toggle sidebar"
  >
    <span class="hamburger-icon">☰</span>
  </button>

  <!-- Sidebar -->
  <div class="sidebar" [class.active]="sidebarActive">
    <div class="logo-container">
      <img src="assets/images/logo.svg" alt="Logo" />
      <button
        class="close-btn"
        (click)="toggleSidebar()"
        aria-label="Close menu"
      >
        ✕
      </button>
    </div>
    <nav class="nav-menu">
      <a
        routerLink="/customer-view/services-pricing"
        routerLinkActive="active"
        class="nav-item"
        (click)="closeSidebarOnMobile()"
      >
        <span class="nav-icon">💰</span> Services & Pricing
      </a>
      <a
        routerLink="/customer-view/appointment"
        routerLinkActive="active"
        class="nav-item"
        (click)="closeSidebarOnMobile()"
      >
        <span class="nav-icon">📅</span> Appointment
      </a>
      <a
        routerLink="/customer-view/tranaction-hitory"
        routerLinkActive="active"
        class="nav-item"
        (click)="closeSidebarOnMobile()"
      >
        <span class="nav-icon">📜</span> Transaction History
      </a>
    </nav>
  </div>

  <!-- Sidebar overlay (mobile only) -->
  <div
    class="sidebar-overlay"
    [class.active]="sidebarActive"
    (click)="toggleSidebar()"
  ></div>

  <!-- Main content area -->
  <div class="content" [class.sidebar-active]="sidebarActive">
    <!-- Header -->
    <header class="header">
      <h1 class="page-title">Customer Dashboard</h1>
      <div class="user-info">
        <span class="user-name">Mark Aducal</span>
        <button class="dropdown-btn" (click)="toggleDropdown()">▼</button>
        <div class="dropdown-menu" [class.show-dropdown]="showDropdown">
          <a class="dropdown-item" routerLink="/customer-view/profile">
            <i class="profile-icon">👤</i> Profile
          </a>
          <a class="dropdown-item" (click)="logout()">
            <i class="logout-icon">🚪</i> Logout
          </a>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
