<body>
  <div class="container">
    <div class="register-form">
      <div class="logo-section">
        <img src="assets/logo.jpg" alt="AutoWash Hub Logo" />
      </div>
      <div class="form-section">
        <div class="signup-box">
          <h2>Sign Up</h2>
          <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
          </div>
          <form (ngSubmit)="onSubmit()">
            <input
              type="text"
              [(ngModel)]="customer.first_name"
              name="first_name"
              placeholder="First Name*"
              required
            />
            <input
              type="text"
              [(ngModel)]="customer.last_name"
              name="last_name"
              placeholder="Last Name"
            />
            <input
              type="email"
              [(ngModel)]="customer.email"
              name="email"
              placeholder="Email*"
              required
            />
            <input
              type="tel"
              [(ngModel)]="customer.phone"
              name="phone"
              placeholder="Phone Number"
            />
            <input
              type="password"
              [(ngModel)]="customer.password"
              name="password"
              placeholder="Password*"
              required
            />
            <input
              type="password"
              [(ngModel)]="customer.confirm_password"
              name="confirm_password"
              placeholder="Confirm Password*"
              required
            />

            <div class="checkbox-container">
              <input type="checkbox" id="terms" required />
              <label for="terms"
                >I agree to the <a href="#">Terms & Conditions</a> and
                <a href="#">Privacy Policy</a>.</label
              >
            </div>

            <button type="submit">Sign Up</button>

            <p class="signin-text">
              Already have an account? <a href="/customer-login">Sign In?</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
