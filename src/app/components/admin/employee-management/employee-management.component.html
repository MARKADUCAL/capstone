<div class="employee-container">
  <div class="header">
    <h2>Employee Management</h2>
    <button mat-raised-button color="primary" (click)="addEmployee()">
      <mat-icon>add</mat-icon>
      Add New Employee
    </button>
  </div>

  <div class="employee-grid">
    @for (employee of employees; track employee.id) {
    <mat-card class="employee-card" [ngClass]="employee.status.toLowerCase()">
      <mat-card-header>
        <div mat-card-avatar>
          <div class="user-avatar-placeholder">
            {{ getUserInitials(employee.name) }}
          </div>
        </div>
        <mat-card-title>{{ employee.name }}</mat-card-title>
        <mat-card-subtitle> Role: {{ employee.role }} </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div class="employee-details">
          <p><mat-icon>phone</mat-icon> {{ employee.phone }}</p>
          <p>
            <mat-icon>fiber_manual_record</mat-icon> Status:
            {{ employee.status }}
          </p>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button color="primary" (click)="viewEmployee(employee)">
          View
        </button>
        <button mat-button color="accent" (click)="editEmployee(employee)">
          Edit
        </button>
        <button mat-button color="warn" (click)="deleteEmployee(employee)">
          Delete
        </button>
      </mat-card-actions>
    </mat-card>
    }
  </div>
</div>
