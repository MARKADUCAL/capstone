<div class="washing-points-container">
  <div class="header">
    <h2>Washing Points</h2>
    <button class="add-button" (click)="addWashingPoint()">
      <mat-icon>add</mat-icon>
      Add New Washing Point
    </button>
  </div>

  <div class="washing-points-grid">
    @for (point of washingPoints; track point.id) {
    <div class="washing-point-card">
      <h3>{{ point.name }}</h3>

      <div class="info-item">
        <mat-icon>location_on</mat-icon>
        <span>{{ point.location }}</span>
      </div>

      <div class="info-item">
        <mat-icon>phone</mat-icon>
        <span>{{ point.phone || "123-456-7890" }}</span>
      </div>

      <div class="card-actions">
        <button class="edit-btn" (click)="editWashingPoint(point)">Edit</button>
        <button class="delete-btn" (click)="deleteWashingPoint(point.id)">
          Delete
        </button>
      </div>
    </div>
    }
  </div>
</div>
